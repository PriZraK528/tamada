{% load static %}
<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}TamaDa{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}" />
  </head>
  <body>
    <header class="site-header">
      <div class="inner">
        <a class="brand" href="{% url 'event_list' %}">TamaDa</a>
        <nav class="nav">
          <a href="{% url 'event_list' %}">События</a>
          {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">Профиль</a>
            <a href="{% url 'event_create' %}">Создать</a>
          {% else %}
            <a href="{% url 'signup' %}">Регистрация</a>
            <a href="{% url 'login' %}">Войти</a>
          {% endif %}
        </nav>
      </div>
    </header>
    <main class="wrap">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
